<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 학교 급식 알리미 + AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .search-input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .ai-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8 flex flex-col items-center">
            <h1 class="text-3xl font-bold text-indigo-600 flex items-center justify-center gap-2 mb-2">
                <i class="fas fa-utensils"></i> 우리 학교 급식 알리미 <span class="text-sm bg-indigo-100 px-2 py-1 rounded-lg">AI+</span>
            </h1>
            <p class="text-gray-500 text-sm md:text-base">전국 학교 급식 정보와 AI 식단 분석</p>
        </header>

        <!-- Search Section -->
        <div class="card p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2 text-gray-600 font-semibold">
                    <i class="fas fa-school text-indigo-500"></i> 학교 검색
                </div>
                <span class="text-[10px] bg-green-100 px-2 py-1 rounded text-green-600 font-mono uppercase tracking-tighter font-bold">API ACTIVE</span>
            </div>
            <div class="flex flex-col md:flex-row gap-3 relative">
                <div class="relative flex-1">
                    <input type="text" id="schoolInput" autocomplete="off"
                           placeholder="학교명을 입력하세요 (예: 봉수초, 강남중)" 
                           class="w-full p-4 pl-5 border border-gray-200 rounded-2xl search-input transition-all">
                    <div id="searchResults" class="absolute z-20 w-full mt-2 bg-white border border-gray-100 rounded-2xl shadow-xl hidden max-h-72 overflow-y-auto custom-scrollbar"></div>
                </div>
                <button onclick="searchSchool()" id="searchBtn" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-2 font-bold shadow-lg shadow-indigo-100">
                    <i class="fas fa-search"></i> 검색
                </button>
            </div>
        </div>

        <!-- Selected School & Date -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="card p-5 flex items-center gap-4 border border-transparent transition-all" id="schoolCard">
                <div class="w-12 h-12 bg-indigo-50 text-indigo-500 rounded-2xl flex items-center justify-center text-xl">
                    <i class="fas fa-university"></i>
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs text-gray-400 font-medium">선택된 학교</p>
                    <p id="selectedSchoolName" class="font-bold text-gray-800 truncate">검색을 완료해 주세요</p>
                </div>
            </div>
            <div class="card p-5 flex items-center gap-4">
                <div class="w-12 h-12 bg-orange-50 text-orange-500 rounded-2xl flex items-center justify-center text-xl">
                    <i class="far fa-calendar-alt"></i>
                </div>
                <div class="flex-1">
                    <p class="text-xs text-gray-400 font-medium">날짜 선택</p>
                    <input type="date" id="datePicker" class="font-bold text-gray-800 w-full bg-transparent border-none p-0 focus:ring-0 cursor-pointer">
                </div>
            </div>
        </div>

        <!-- Result Section -->
        <div id="mealContent" class="hidden animate-in fade-in duration-500">
            <!-- Meal Type Header -->
            <div class="card bg-indigo-50/50 border border-indigo-100 p-4 mb-4 flex flex-wrap justify-between items-center rounded-2xl gap-3">
                <div class="flex items-center gap-3">
                    <span id="mealTypeBadge" class="bg-indigo-600 text-white px-4 py-1.5 rounded-xl text-sm font-bold shadow-sm shadow-indigo-200">중식</span>
                    <span id="displayDate" class="text-indigo-900 font-bold"></span>
                </div>
                <div class="flex gap-2">
                    <div id="calories" class="bg-white px-4 py-1.5 rounded-full text-indigo-600 font-bold text-sm shadow-sm border border-indigo-50">
                        - Kcal
                    </div>
                    <button onclick="analyzeMeal()" id="aiBtn" class="ai-gradient text-white px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 hover:opacity-90 transition-opacity">
                        <i class="fas fa-magic"></i> AI 분석
                    </button>
                </div>
            </div>

            <!-- AI Insight Panel -->
            <div id="aiInsightPanel" class="hidden mb-6 animate-in slide-in-from-top-4 duration-500">
                <div class="card p-6 border-2 border-indigo-200 bg-indigo-50/20 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <i class="fas fa-robot text-6xl text-indigo-600"></i>
                    </div>
                    <div class="relative z-10">
                        <h4 class="text-indigo-700 font-bold mb-3 flex items-center gap-2">
                            <i class="fas fa-brain"></i> AI 급식 레포트
                        </h4>
                        <div id="aiResponse" class="text-gray-700 text-sm leading-relaxed space-y-3"></div>
                    </div>
                </div>
            </div>

            <!-- Detailed Info -->
            <div class="card p-8 grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div class="flex items-center gap-2">
                        <div class="h-6 w-1 bg-indigo-500 rounded-full"></div>
                        <h3 class="text-gray-800 font-bold text-lg">오늘의 메뉴</h3>
                    </div>
                    <ul id="menuList" class="space-y-4 text-gray-700 text-lg font-medium leading-relaxed bg-indigo-50/30 p-6 rounded-3xl border border-indigo-50/50"></ul>
                </div>

                <div class="space-y-8">
                    <div>
                        <h3 class="text-gray-400 font-bold text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                            <i class="fas fa-map-marker-alt"></i> 원산지
                        </h3>
                        <div class="bg-gray-50 p-5 rounded-2xl text-xs text-gray-500 leading-relaxed border border-gray-100" id="originInfo"></div>
                    </div>
                    <div>
                        <h3 class="text-gray-400 font-bold text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                            <i class="fas fa-chart-pie"></i> 영양소
                        </h3>
                        <div class="text-xs text-gray-500 leading-loose bg-orange-50/30 p-5 rounded-2xl border border-orange-50/50" id="nutritionInfo"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="card p-16 text-center text-gray-400 flex flex-col items-center gap-4 transition-all">
            <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-2">
                <i class="fas fa-search-plus text-3xl text-gray-300"></i>
            </div>
            <p class="text-gray-600 font-bold text-lg">학교를 먼저 찾아보세요</p>
            <p class="text-xs">전국 초/중/고등학교 이름을 검색창에 입력해 주세요.</p>
        </div>
    </div>

    <script>
        // API 설정: HTML에는 더 이상 Gemini 키가 존재하지 않습니다! (보안 강화)
        const NEIS_API_KEY = '3f1c398426eb4288b86839b053513f3f';
        const BASE_URL = 'https://open.neis.go.kr/hub';
        
        let selectedSchool = { atptCode: '', schoolCode: '', name: '' };
        let currentMealData = null;

        // 로컬 시간대(KST)를 기준으로 오늘 날짜 세팅
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        document.getElementById('datePicker').value = `${year}-${month}-${day}`;

        async function searchSchool() {
            const query = document.getElementById('schoolInput').value.trim();
            const resultsDiv = document.getElementById('searchResults');
            const searchBtn = document.getElementById('searchBtn');

            if (query.length < 2) {
                resultsDiv.innerHTML = '<div class="p-6 text-orange-500 text-center font-bold text-sm"><i class="fas fa-exclamation-triangle mr-1"></i> 학교명을 2글자 이상 입력해 주세요.</div>';
                resultsDiv.classList.remove('hidden');
                return;
            }

            resultsDiv.innerHTML = '<div class="p-6 flex flex-col items-center gap-3"><div class="loader"></div></div>';
            resultsDiv.classList.remove('hidden');
            searchBtn.disabled = true;

            try {
                const url = `${BASE_URL}/schoolInfo?KEY=${NEIS_API_KEY}&Type=json&pIndex=1&pSize=100&SCHUL_NM=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.schoolInfo) {
                    const schools = data.schoolInfo[1].row;
                    resultsDiv.innerHTML = schools.map(school => `
                        <div onclick="selectSchool('${school.ATPT_OFCDC_SC_CODE}', '${school.SD_SCHUL_CODE}', '${school.SCHUL_NM}')" 
                             class="p-4 hover:bg-indigo-50 cursor-pointer border-b border-gray-50 last:border-none transition-colors group">
                            <p class="font-bold text-gray-800 group-hover:text-indigo-600">${school.SCHUL_NM}</p>
                            <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-wider">${school.ATPT_OFCDC_SC_NM} · ${school.ORG_RDNMA || '주소 정보 없음'}</p>
                        </div>
                    `).join('');
                } else {
                    const msg = data.RESULT ? data.RESULT.MESSAGE : "결과가 없습니다.";
                    resultsDiv.innerHTML = `<div class="p-8 text-center text-gray-500 text-sm">${msg}</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = '<div class="p-6 text-red-500 text-center text-sm"><i class="fas fa-wifi mr-1"></i> 네트워크 오류가 발생했습니다.</div>';
            } finally {
                searchBtn.disabled = false;
            }
        }

        function selectSchool(atptCode, schoolCode, name) {
            selectedSchool = { atptCode, schoolCode, name };
            document.getElementById('selectedSchoolName').innerText = name;
            document.getElementById('schoolCard').classList.add('border-indigo-200', 'bg-indigo-50/20');
            document.getElementById('schoolInput').value = name;
            document.getElementById('searchResults').classList.add('hidden');
            fetchMeal();
        }

        async function fetchMeal() {
            if (!selectedSchool.schoolCode) return;
            const selectedDate = document.getElementById('datePicker').value;
            const apiDate = selectedDate.replace(/-/g, '');
            
            const statusMessage = document.getElementById('statusMessage');
            const mealContent = document.getElementById('mealContent');
            
            statusMessage.classList.remove('hidden');
            statusMessage.innerHTML = '<div class="loader"></div>';
            mealContent.classList.add('hidden');
            document.getElementById('aiInsightPanel').classList.add('hidden');

            try {
                const url = `${BASE_URL}/mealServiceDietInfo?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${selectedSchool.atptCode}&SD_SCHUL_CODE=${selectedSchool.schoolCode}&MLSV_YMD=${apiDate}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.mealServiceDietInfo) {
                    const rows = data.mealServiceDietInfo[1].row;
                    currentMealData = rows.find(r => r.MMEAL_SC_NM.includes('중식')) || rows[0];
                    updateUI(currentMealData, selectedDate);
                } else {
                    showError("해당 날짜에 등록된 급식 정보가 없습니다.");
                }
            } catch (error) {
                showError("데이터를 불러오는 중 오류가 발생했습니다.");
            }
        }

        function updateUI(meal, date) {
            document.getElementById('statusMessage').classList.add('hidden');
            document.getElementById('mealContent').classList.remove('hidden');
            document.getElementById('displayDate').innerText = date;
            document.getElementById('mealTypeBadge').innerText = meal.MMEAL_SC_NM;
            document.getElementById('calories').innerText = meal.CAL_INFO || '정보 없음';

            const menuItems = meal.DDISH_NM.split('<br/>').map(item => item.replace(/[0-9.]/g, '').replace(/\(\)/g, '').trim());
            document.getElementById('menuList').innerHTML = menuItems.map(item => `<li class="flex items-center gap-3"><span class="w-1.5 h-1.5 bg-indigo-300 rounded-full"></span>${item}</li>`).join('');

            document.getElementById('originInfo').innerHTML = meal.ORPLC_INFO ? meal.ORPLC_INFO.replace(/<br\/>/g, '<br>') : '정보 없음';
            document.getElementById('nutritionInfo').innerHTML = meal.NTR_INFO ? meal.NTR_INFO.replace(/<br\/>/g, ' / ') : '정보 없음';
        }

        // ⭐ 변경된 부분: 구글 API로 직접 요청하지 않고, 우리의 Vercel 서버(/api/analyze)로 요청합니다.
        async function analyzeMeal() {
            if (!currentMealData) return;

            const aiBtn = document.getElementById('aiBtn');
            const insightPanel = document.getElementById('aiInsightPanel');
            const aiResponseArea = document.getElementById('aiResponse');

            aiBtn.disabled = true;
            aiBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 분석 중';
            insightPanel.classList.remove('hidden');
            aiResponseArea.innerHTML = '<p class="text-xs animate-pulse text-indigo-400"><i class="fas fa-cogs"></i> Gemini AI가 오늘의 급식을 분석하고 있습니다...</p>';

            const prompt = `당신은 학교 영양사입니다. 다음 메뉴를 분석해 주세요.
            학교: ${selectedSchool.name} / 메뉴: ${currentMealData.DDISH_NM} / 칼로리: ${currentMealData.CAL_INFO}
            1. 영양 성분 장점 (단백질, 비타민 등)
            2. 맛의 조화 및 특징
            3. 성장을 위한 조언 한마디
            친절하고 학생이 듣는 것처럼 부드럽게 답변하세요. 한국어로 답변하세요.`;

            try {
                // 우리의 백엔드 API로 프롬프트 전송
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                
                const data = await response.json();

                if (data.resultText) {
                    aiResponseArea.innerHTML = `<div class="prose prose-sm max-w-none text-gray-700">
                        ${data.resultText.replace(/\*\*(.*?)\*\*/g, '<strong class="text-indigo-700">$1</strong>').replace(/\n/g, '<br>')}
                    </div>`;
                } else { throw new Error(data.error || '분석 실패'); }
            } catch (err) {
                console.error(err);
                aiResponseArea.innerHTML = '<p class="text-xs text-red-400"><i class="fas fa-exclamation-circle"></i> AI 분석 기능을 현재 사용할 수 없습니다.</p>';
            } finally {
                aiBtn.disabled = false;
                aiBtn.innerHTML = '<i class="fas fa-magic"></i> AI 분석';
            }
        }

        function showError(msg) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.classList.remove('hidden');
            statusMessage.innerHTML = `<i class="fas fa-info-circle text-2xl text-indigo-300"></i><p class="text-sm font-medium text-gray-500">${msg}</p>`;
        }

        document.getElementById('datePicker').addEventListener('change', fetchMeal);
        document.getElementById('schoolInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchSchool(); });
        document.addEventListener('click', (e) => {
            if (!document.getElementById('schoolInput').parentElement.contains(e.target)) {
                document.getElementById('searchResults').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
